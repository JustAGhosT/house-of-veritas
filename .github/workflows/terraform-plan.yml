name: 'Terraform Plan'

on:
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: '1.5.7'
  WORKING_DIR: './terraform/environments/production'

jobs:
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Set Terraform ARM credentials
        run: |
          CREDS='${{ secrets.AZURE_CREDENTIALS }}'
          echo "ARM_CLIENT_ID=$(echo $CREDS | jq -r .clientId)" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=$(echo $CREDS | jq -r .clientSecret)" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=$(echo $CREDS | jq -r .tenantId)" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=$(echo $CREDS | jq -r .subscriptionId)" >> $GITHUB_ENV
      
      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_STATE_KEY: ${{ secrets.TF_STATE_KEY || 'production.terraform.tfstate' }}
          TF_STATE_RESOURCE_GROUP: ${{ secrets.TF_STATE_RESOURCE_GROUP }}
          TF_STATE_STORAGE_ACCOUNT: ${{ secrets.TF_STATE_STORAGE_ACCOUNT }}
          TF_STATE_CONTAINER: ${{ secrets.TF_STATE_CONTAINER }}
        run: |
          terraform init \
            -backend-config="resource_group_name=$TF_STATE_RESOURCE_GROUP" \
            -backend-config="storage_account_name=$TF_STATE_STORAGE_ACCOUNT" \
            -backend-config="container_name=$TF_STATE_CONTAINER" \
            -backend-config="key=$TF_STATE_KEY"
      
      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate
      
      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive
        continue-on-error: true
      
      - name: Fetch GitHub Actions IP ranges
        id: gh-ips
        run: |
          IPS=$(curl -fsS https://api.github.com/meta | jq -r '.actions[]' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | grep -vE '/3[12]$' || true)
          CI_IP_RANGES=$(echo "$IPS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "ranges=$CI_IP_RANGES" >> $GITHUB_OUTPUT
          echo "Fetched $(echo "$IPS" | grep -c . || echo 0) GitHub Actions IPv4 ranges"

      - name: Get runner public IP (fallback)
        id: ip
        run: |
          IP=$(curl -fsS --retry 3 https://api.ipify.org) || echo ""
          echo "ip=${IP:-}" >> $GITHUB_OUTPUT

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME || 'nexamesh.ai' }}
          DB_ADMIN_PASSWORD: ${{ secrets.DB_ADMIN_PASSWORD }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SSL_CERTIFICATE_DATA: ${{ secrets.SSL_CERTIFICATE_DATA }}
          SSL_CERTIFICATE_PASSWORD: ${{ secrets.SSL_CERTIFICATE_PASSWORD }}
          CI_IP_RANGES: ${{ steps.gh-ips.outputs.ranges }}
          DEPLOYER_IP: ${{ steps.ip.outputs.ip }}
        run: |
          if [ -n "$CI_IP_RANGES" ] && [ "$CI_IP_RANGES" != "[]" ] && [ "$CI_IP_RANGES" != "null" ]; then
            VAR_CI="-var=ci_allowed_ip_ranges=$CI_IP_RANGES"
          else
            VAR_CI="-var=deployer_ip=$DEPLOYER_IP"
          fi
          terraform plan \
            -var="domain_name=$DOMAIN_NAME" \
            -var="db_admin_password=$DB_ADMIN_PASSWORD" \
            -var="smtp_username=$SMTP_USERNAME" \
            -var="smtp_password=$SMTP_PASSWORD" \
            -var="ssl_certificate_data=$SSL_CERTIFICATE_DATA" \
            -var="ssl_certificate_password=$SSL_CERTIFICATE_PASSWORD" \
            $VAR_CI \
            -out=tfplan \
            -no-color
        continue-on-error: true
      
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 5
      
      - name: Capture Plan Output
        id: show-plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          plan="Terraform plan generated. Download the 'tfplan' artifact for full details."
          echo "plan<<EOF" >> $GITHUB_OUTPUT
          echo "$plan" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      - name: Comment PR with Plan
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: "${{ steps.show-plan.outputs.plan }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '#### Terraform Plan 📋';
            const output = `${marker}
            
            <details><summary>Show Plan</summary>
            
            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`
            
            </details>
            
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body && c.body.startsWith(marker));
            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              });
            }
