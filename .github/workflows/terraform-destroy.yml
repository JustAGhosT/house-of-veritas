name: 'Terraform Destroy (Manual)'

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type DESTROY to confirm'
        required: true

env:
  TF_VERSION: '1.5.7'
  WORKING_DIR: './terraform/environments/production'

jobs:
  terraform-destroy:
    name: 'Terraform Destroy'
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "Error: Must type DESTROY to confirm"
            exit 1
          fi
      
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Set Terraform ARM credentials
        run: |
          CREDS='${{ secrets.AZURE_CREDENTIALS }}'
          echo "ARM_CLIENT_ID=$(echo $CREDS | jq -r .clientId)" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=$(echo $CREDS | jq -r .clientSecret)" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=$(echo $CREDS | jq -r .tenantId)" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=$(echo $CREDS | jq -r .subscriptionId)" >> $GITHUB_ENV
      
      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY || 'production.terraform.tfstate' }}"
      
      - name: Fetch GitHub Actions IP ranges
        id: gh-ips
        run: |
          IPS=$(curl -fsS https://api.github.com/meta | jq -r '.actions[]' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | grep -vE '/3[12]$' || true)
          CI_IP_RANGES=$(echo "$IPS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "ranges=$CI_IP_RANGES" >> $GITHUB_OUTPUT
          echo "Fetched $(echo "$IPS" | grep -c . || echo 0) GitHub Actions IPv4 ranges"

      - name: Get runner public IP (fallback)
        id: ip
        run: |
          IP=$(curl -fsS --retry 3 https://api.ipify.org) || echo ""
          echo "ip=${IP:-}" >> $GITHUB_OUTPUT

      - name: Terraform Destroy
        working-directory: ${{ env.WORKING_DIR }}
        env:
          CI_IP_RANGES: ${{ steps.gh-ips.outputs.ranges }}
          DEPLOYER_IP: ${{ steps.ip.outputs.ip }}
        run: |
          if [ -n "$CI_IP_RANGES" ] && [ "$CI_IP_RANGES" != "[]" ] && [ "$CI_IP_RANGES" != "null" ]; then
            VAR_CI="-var=ci_allowed_ip_ranges=$CI_IP_RANGES"
          else
            VAR_CI="-var=deployer_ip=$DEPLOYER_IP"
          fi
          terraform destroy \
            -var="domain_name=${{ vars.DOMAIN_NAME || 'nexamesh.ai' }}" \
            -var="db_admin_password=${{ secrets.DB_ADMIN_PASSWORD }}" \
            -var="smtp_username=${{ secrets.SMTP_USERNAME }}" \
            -var="smtp_password=${{ secrets.SMTP_PASSWORD }}" \
            -var="ssl_certificate_data=${{ secrets.SSL_CERTIFICATE_DATA }}" \
            -var="ssl_certificate_password=${{ secrets.SSL_CERTIFICATE_PASSWORD }}" \
            $VAR_CI \
            -auto-approve
      
      - name: Send Notification
        run: |
          echo "Infrastructure destroyed successfully!"
