name: 'Azure Functions Deployment'

on:
  push:
    branches:
      - main
    paths:
      - 'config/azure-functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_RESOURCE_GROUP: 'nl-prod-hov-rg-san'
  AZURE_FUNCTIONAPP_NAME: 'nl-prod-hov-func-san'
  PYTHON_VERSION: '3.11'

jobs:
  deploy-functions:
    name: 'Deploy Azure Functions'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check Function App Exists
        id: check-app
        run: |
          EXISTS=$(az functionapp show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --query "name" -o tsv 2>/dev/null || echo "")

          if [ -n "$EXISTS" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Function App exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Function App does not exist - deploy infrastructure first"
          fi

      - name: Create Function App Package
        if: steps.check-app.outputs.exists == 'true'
        run: |
          mkdir -p function_app

          cp -r config/azure-functions/DocuSealWebhook function_app/
          cp -r config/azure-functions/DocumentExpiryAlert function_app/
          cp -r config/azure-functions/RecurringTasks function_app/
          cp -r config/azure-functions/OvertimeCalculator function_app/
          cp -r config/azure-functions/LeaveBalanceUpdate function_app/
          cp -r config/azure-functions/ExpenseNotification function_app/
          cp -r config/azure-functions/BudgetReport function_app/
          cp -r config/azure-functions/BackupExport function_app/
          cp -r config/azure-functions/shared function_app/

          cp config/azure-functions/host.json function_app/
          cp config/azure-functions/requirements.txt function_app/

          echo "Function app package created with all 8 functions"

      - name: Install Dependencies
        if: steps.check-app.outputs.exists == 'true'
        run: |
          cd function_app
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Deploy to Azure Functions
        if: steps.check-app.outputs.exists == 'true'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: function_app
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

      - name: Verify Deployment
        if: steps.check-app.outputs.exists == 'true'
        run: |
          az functionapp function list \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --output table

          echo "## Azure Functions Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Function | Trigger | Schedule |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| DocuSealWebhook | HTTP POST | On demand |" >> $GITHUB_STEP_SUMMARY
          echo "| DocumentExpiryAlert | Timer | Daily 6:00 AM |" >> $GITHUB_STEP_SUMMARY
          echo "| RecurringTasks | Timer | Monday 8:00 AM |" >> $GITHUB_STEP_SUMMARY
          echo "| OvertimeCalculator | Timer | Sunday 11:00 PM |" >> $GITHUB_STEP_SUMMARY
          echo "| LeaveBalanceUpdate | Timer | Monthly 1st 7:00 AM |" >> $GITHUB_STEP_SUMMARY
          echo "| ExpenseNotification | HTTP POST | On demand |" >> $GITHUB_STEP_SUMMARY
          echo "| BudgetReport | Timer | Monthly 5th 8:00 AM |" >> $GITHUB_STEP_SUMMARY
          echo "| BackupExport | Timer | Sunday midnight |" >> $GITHUB_STEP_SUMMARY

      - name: Skip Notice
        if: steps.check-app.outputs.exists != 'true'
        run: |
          echo "## Deployment Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Function App '${{ env.AZURE_FUNCTIONAPP_NAME }}' does not exist." >> $GITHUB_STEP_SUMMARY
          echo "Deploy infrastructure first using the Terraform workflow." >> $GITHUB_STEP_SUMMARY
