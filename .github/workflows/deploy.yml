name: 'Full Deployment Pipeline'

# Triggered manually or on release tags
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      skip_checklist:
        description: 'Skip deployment checklist'
        required: false
        type: boolean
        default: false
      deploy_infrastructure:
        description: 'Deploy infrastructure changes'
        required: false
        type: boolean
        default: true
      seed_data:
        description: 'Seed initial data'
        required: false
        type: boolean
        default: false
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

env:
  WORKING_DIR: './terraform/environments/production'
  AZURE_RESOURCE_GROUP: 'nl-prod-hov-rg-san'
  AZURE_ENV: 'prod'

jobs:
  # ============================================
  # Job 1: Pre-Deployment Validation
  # ============================================
  pre-deploy-validation:
    name: 'Pre-Deployment Validation'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ !inputs.skip_checklist }}
    outputs:
      ready: ${{ steps.validate.outputs.ready }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Azure CLI
        run: curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Run Deployment Checklist
        id: validate
        env:
          AZURE_SUBSCRIPTION_ID: ${{ fromJSON(secrets.AZURE_CREDENTIALS).subscriptionId }}
          AZURE_RESOURCE_GROUP: ${{ env.AZURE_RESOURCE_GROUP }}
        run: |
          python3 config/scripts/deployment-checklist.py --json > checklist.json
          
          # Check if there are critical failures that would block deployment
          FAILED=$(python3 -c "import json; data=json.load(open('checklist.json')); prereqs=[c for cat in data['categories'] if cat['name']=='Prerequisites' for c in cat['checks']]; print(sum(1 for p in prereqs if p['status']=='FAIL'))")
          
          if [ "$FAILED" -gt "2" ]; then
            echo "❌ Too many prerequisite failures ($FAILED). Cannot proceed."
            echo "ready=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ Prerequisites check passed"
            echo "ready=true" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # Job 2: Build Application
  # ============================================
  build:
    name: 'Build Application'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [pre-deploy-validation]
    if: always() && (needs.pre-deploy-validation.result == 'success' || needs.pre-deploy-validation.result == 'skipped')
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGODB_URI: mongodb://localhost:27017/house_of_veritas_test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
      
      - name: Run Unit Tests
        run: npm test
      
      - name: Build Application
        run: npm run build
      
      - name: Prepare Standalone for Deployment
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          jq '.scripts = ((.scripts // {}) + {"start": "node server.js"})' .next/standalone/package.json > .next/standalone/package.json.tmp && mv .next/standalone/package.json.tmp .next/standalone/package.json
      
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/standalone
          retention-days: 7

  # ============================================
  # Job 2b: E2E Tests
  # ============================================
  e2e:
    name: 'E2E Tests'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGODB_URI: mongodb://localhost:27017/house_of_veritas_test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          CI: true
          JWT_SECRET: e2e-test-secret-do-not-use-in-production

  # ============================================
  # Job 3: Deploy Infrastructure
  # ============================================
  deploy-infrastructure:
    name: 'Deploy Infrastructure'
    runs-on: [self-hosted, azure-vnet-ghost]
    timeout-minutes: 45
    needs: [build]
    if: ${{ inputs.deploy_infrastructure }}
    environment: ${{ inputs.environment || 'production' }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Verify Terraform
        run: |
          REQUIRED="1.5.0"
          TF_VER=$(terraform version -json | jq -r '.terraform_version')
          MIN=$(printf '%s\n%s' "$REQUIRED" "$TF_VER" | sort -V | head -n1)
          if [ "$MIN" != "$REQUIRED" ]; then
            echo "Terraform $TF_VER does not satisfy required_version >= $REQUIRED (from terraform/environments/production/main.tf)"
            exit 1
          fi
          terraform version
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Set Terraform ARM credentials
        run: |
          CREDS='${{ secrets.AZURE_CREDENTIALS }}'
          echo "ARM_CLIENT_ID=$(echo $CREDS | jq -r .clientId)" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=$(echo $CREDS | jq -r .clientSecret)" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=$(echo $CREDS | jq -r .tenantId)" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=$(echo $CREDS | jq -r .subscriptionId)" >> $GITHUB_ENV
      
      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY || 'production.terraform.tfstate' }}"

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var="domain_name=${{ vars.DOMAIN_NAME || 'nexamesh.ai' }}" \
            -var="db_admin_password=${{ secrets.DB_ADMIN_PASSWORD }}" \
            -var="smtp_username=${{ secrets.SMTP_USERNAME }}" \
            -var="smtp_password=${{ secrets.SMTP_PASSWORD }}" \
            -var="ssl_certificate_data=${{ secrets.SSL_CERTIFICATE_DATA }}" \
            -var="ssl_certificate_password=${{ secrets.SSL_CERTIFICATE_PASSWORD }}" \
            -out=tfplan
      
      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve tfplan
      
      - name: Output Infrastructure Details
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "## Infrastructure Outputs" >> $GITHUB_STEP_SUMMARY
          SENSITIVE_KEYS="document_intelligence_key|storage_connection_string|connection_string|primary_access_key|_password|_secret"
          terraform output -json | python3 -c "
          import json, re, sys
          outputs = json.load(sys.stdin)
          sensitive = re.compile(r'$SENSITIVE_KEYS', re.I)
          for k, v in outputs.items():
              if not sensitive.search(k):
                  val = v.get('value', 'N/A')
                  print(f'- **{k}**: {val}')
              else:
                  print(f'- **{k}**: [REDACTED]')
          " >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 4: Deploy Next.js Web App
  # ============================================
  deploy-webapp:
    name: 'Deploy Web App'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, deploy-infrastructure]
    if: always() && needs.build.result == 'success' && (needs.deploy-infrastructure.result == 'success' || needs.deploy-infrastructure.result == 'skipped')
    environment: ${{ inputs.environment || 'production' }}
    
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build

      - name: Create deployment package
        run: zip -r deploy.zip . -x "*.git*"
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.WEBAPP_NAME || 'nl-prod-hov-app-san' }}
          package: deploy.zip
      
      - name: Verify Web App Health
        run: |
          APP_URL="https://${{ vars.WEBAPP_NAME || 'nl-prod-hov-app-san' }}.azurewebsites.net"
          for i in {1..10}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL" || echo "000")
            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ]; then
              echo "Web App is healthy (HTTP $HTTP_STATUS)"
              break
            fi
            echo "Waiting for Web App... (attempt $i/10, got HTTP $HTTP_STATUS)"
            sleep 15
          done

  # ============================================
  # Job 5: Deploy DocuSeal
  # ============================================
  deploy-docuseal:
    name: 'Deploy DocuSeal'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [deploy-infrastructure]
    environment: ${{ inputs.environment || 'production' }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Check DocuSeal Container Status
        run: |
          STATUS=$(az container show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name aci-docuseal \
            --query "instanceView.state" -o tsv 2>/dev/null || echo "NotFound")
          
          echo "DocuSeal container status: $STATUS"
          
          if [ "$STATUS" != "Running" ]; then
            echo "⚠️ DocuSeal is not running. Attempting restart..."
            az container restart \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name aci-docuseal || echo "Container may not exist yet"
          fi
      
      - name: Verify DocuSeal Health
        run: |
          DOCUSEAL_URL="${{ secrets.DOCUSEAL_URL }}"
          healthy=false

          if [ -n "$DOCUSEAL_URL" ]; then
            for i in {1..5}; do
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DOCUSEAL_URL/health" || echo "000")
              if [ "$HTTP_STATUS" = "200" ]; then
                echo "✅ DocuSeal is healthy"
                healthy=true
                break
              fi
              echo "Waiting for DocuSeal... (attempt $i/5)"
              sleep 30
            done
            if [ "$healthy" != "true" ]; then
              echo "❌ DocuSeal health check failed after 5 attempts"
              exit 1
            fi
          else
            echo "⚠️ DOCUSEAL_URL not configured, skipping health check"
          fi

  # ============================================
  # Job 5: Deploy Baserow
  # ============================================
  deploy-baserow:
    name: 'Deploy Baserow'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [deploy-infrastructure]
    environment: ${{ inputs.environment || 'production' }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Check Baserow Container Status
        run: |
          STATUS=$(az container show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name aci-baserow \
            --query "instanceView.state" -o tsv 2>/dev/null || echo "NotFound")
          
          echo "Baserow container status: $STATUS"
          
          if [ "$STATUS" != "Running" ]; then
            echo "⚠️ Baserow is not running. Attempting restart..."
            az container restart \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name aci-baserow || echo "Container may not exist yet"
          fi
      
      - name: Verify Baserow Health
        run: |
          BASEROW_URL="${{ secrets.BASEROW_URL }}"
          healthy=false

          if [ -n "$BASEROW_URL" ]; then
            for i in {1..5}; do
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASEROW_URL/api/health/" || echo "000")
              if [ "$HTTP_STATUS" = "200" ]; then
                echo "✅ Baserow is healthy"
                healthy=true
                break
              fi
              echo "Waiting for Baserow... (attempt $i/5)"
              sleep 30
            done
            if [ "$healthy" != "true" ]; then
              echo "❌ Baserow health check failed after 5 attempts"
              exit 1
            fi
          else
            echo "⚠️ BASEROW_URL not configured, skipping health check"
          fi

  # ============================================
  # Job 6: Seed Data (Optional)
  # ============================================
  seed-data:
    name: 'Seed Initial Data'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deploy-baserow]
    if: ${{ inputs.seed_data }}
    environment: ${{ inputs.environment || 'production' }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: pip install requests
      
      - name: Run Data Seeding Script
        env:
          BASEROW_URL: ${{ secrets.BASEROW_URL }}
          BASEROW_TOKEN: ${{ secrets.BASEROW_TOKEN }}
        run: |
          if [ -n "$BASEROW_URL" ] && [ -n "$BASEROW_TOKEN" ]; then
            echo "Running data seeding script..."
            python3 config/scripts/seed-baserow.py
          else
            echo "⚠️ BASEROW_URL or BASEROW_TOKEN not configured"
            echo "Seeding script cannot run without proper credentials"
          fi

  # ============================================
  # Job 7: Post-Deployment Verification
  # ============================================
  post-deploy-verification:
    name: 'Post-Deployment Verification'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deploy-webapp, deploy-docuseal, deploy-baserow]
    if: always()
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Azure CLI
        run: curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Run Final Deployment Checklist
        env:
          AZURE_SUBSCRIPTION_ID: ${{ fromJSON(secrets.AZURE_CREDENTIALS).subscriptionId }}
          AZURE_RESOURCE_GROUP: ${{ env.AZURE_RESOURCE_GROUP }}
        run: |
          echo "## 🔍 Post-Deployment Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          python3 config/scripts/deployment-checklist.py --verbose | tee checklist_output.txt
          
          # Add to summary
          PASSED=$(grep -oP '✅ Passed:\s+\K\d+' checklist_output.txt || echo "0")
          FAILED=$(grep -oP '❌ Failed:\s+\K\d+' checklist_output.txt || echo "0")
          
          echo "- ✅ Passed: $PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- ❌ Failed: $FAILED" >> $GITHUB_STEP_SUMMARY
          
          if [ "$FAILED" -gt "0" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Some checks failed. Review the logs for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🎉 Deployment verification complete!" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================
  # Job 8: Deployment Summary
  # ============================================
  deployment-summary:
    name: 'Deployment Summary'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build, deploy-infrastructure, deploy-webapp, deploy-docuseal, deploy-baserow, post-deploy-verification]
    if: always()
    
    steps:
      - name: Generate Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result == 'success' && '✅' || '❌' }} ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Infrastructure | ${{ needs.deploy-infrastructure.result == 'success' && '✅' || needs.deploy-infrastructure.result == 'skipped' && '⏭️' || '❌' }} ${{ needs.deploy-infrastructure.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web App | ${{ needs.deploy-webapp.result == 'success' && '✅' || needs.deploy-webapp.result == 'skipped' && '⏭️' || '❌' }} ${{ needs.deploy-webapp.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DocuSeal | ${{ needs.deploy-docuseal.result == 'success' && '✅' || needs.deploy-docuseal.result == 'skipped' && '⏭️' || '❌' }} ${{ needs.deploy-docuseal.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Baserow | ${{ needs.deploy-baserow.result == 'success' && '✅' || needs.deploy-baserow.result == 'skipped' && '⏭️' || '❌' }} ${{ needs.deploy-baserow.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Verification | ${{ needs.post-deploy-verification.result == 'success' && '✅' || '❌' }} ${{ needs.post-deploy-verification.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Overall status
          if [ "${{ needs.build.result }}" = "success" ] && \
             [ "${{ needs.post-deploy-verification.result }}" = "success" ]; then
            echo "### ✅ Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Deployment completed with issues" >> $GITHUB_STEP_SUMMARY
          fi
