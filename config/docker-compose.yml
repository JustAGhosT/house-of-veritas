# House of Veritas - Docker Compose Configuration
# This file orchestrates DocuSeal and Baserow for local development
# For production deployment, use Azure Container Instances via Terraform

version: "3.8"

services:
  # ============================================
  # DocuSeal - Document Signing & Management
  # ============================================
  docuseal:
    image: docuseal/docuseal:latest
    container_name: hov-docuseal
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=${DOCUSEAL_DATABASE_URL}
      - SECRET_KEY_BASE=${DOCUSEAL_SECRET_KEY}
      - SMTP_ADDRESS=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - HOST=${DOCUSEAL_HOST}
      - FORCE_SSL=true
    volumes:
      - docuseal_data:/data
    depends_on:
      - postgres
    networks:
      - hov-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================
  # Baserow - No-Code Database Platform
  # ============================================
  baserow:
    image: baserow/baserow:latest
    container_name: hov-baserow
    restart: unless-stopped
    ports:
      - "3002:80"
    environment:
      - BASEROW_PUBLIC_URL=${BASEROW_PUBLIC_URL}
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${BASEROW_DATABASE_NAME}
      - DATABASE_USER=${POSTGRES_USER}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - SECRET_KEY=${BASEROW_SECRET_KEY}
      - EMAIL_SMTP=true
      - EMAIL_SMTP_HOST=${SMTP_HOST}
      - EMAIL_SMTP_PORT=${SMTP_PORT}
      - EMAIL_SMTP_USER=${SMTP_USERNAME}
      - EMAIL_SMTP_PASSWORD=${SMTP_PASSWORD}
      - FROM_EMAIL=${SMTP_FROM_EMAIL}
      - BASEROW_EXTRA_ALLOWED_HOSTS=${BASEROW_ALLOWED_HOSTS}
    volumes:
      - baserow_data:/baserow/data
    depends_on:
      - postgres
      - redis
    networks:
      - hov-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ============================================
  # PostgreSQL - Shared Database Server
  # ============================================
  postgres:
    image: postgres:14-alpine
    container_name: hov-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_MULTIPLE_DATABASES=${DOCUSEAL_DATABASE_NAME},${BASEROW_DATABASE_NAME},house_of_veritas
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    networks:
      - hov-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MongoDB - Kiosk requests, audit log fallback
  # ============================================
  mongodb:
    image: mongo:7
    container_name: hov-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - hov-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis - Cache for Baserow
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: hov-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - hov-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # n8n - Workflow Automation (Business Rules)
  # Phase 4: expense >R5k, incident High→SMS, task overdue, vehicle mileage
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: hov-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - GENERIC_TIMEZONE=Africa/Johannesburg
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - hov-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # Nginx - Reverse Proxy (Local Development)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: hov-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - docuseal
      - baserow
    networks:
      - hov-network

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    name: hov_postgres_data
  mongodb_data:
    name: hov_mongodb_data
  docuseal_data:
    name: hov_docuseal_data
  baserow_data:
    name: hov_baserow_data
  redis_data:
    name: hov_redis_data
  n8n_data:
    name: hov_n8n_data

# ============================================
# Networks
# ============================================
networks:
  hov-network:
    name: hov-network
    driver: bridge
